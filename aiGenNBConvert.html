<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正则替换工具 - 换行符/空格互换</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .description {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 25px;
        }
        
        .input-section, .output-section {
            margin-bottom: 25px;
        }
        
        h2 {
            font-size: 18px;
            color: #4b6cb7;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        h2 i {
            margin-right: 10px;
        }
        
        .mode-selector {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .mode-toggle {
            display: inline-flex;
            background-color: #f5f7fa;
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mode-btn i {
            margin-right: 8px;
        }
        
        .mode-btn.active {
            background: #4b6cb7;
            color: white;
            box-shadow: 0 3px 8px rgba(75, 108, 183, 0.3);
        }
        
        .mode-btn:hover:not(.active) {
            background-color: #e9edf7;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
            line-height: 1.5;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #4b6cb7;
            box-shadow: 0 0 0 2px rgba(75, 108, 183, 0.2);
        }
        
        .output-container {
            position: relative;
        }
        
        .output {
            background-color: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            min-height: 150px;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .output:hover {
            background-color: #f0f4ff;
            border-color: #4b6cb7;
        }
        
        .copy-notification {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #4b6cb7;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .copy-notification.show {
            opacity: 1;
        }
        
        .copy-hint {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
        }
        
        .copy-hint i {
            margin-right: 5px;
        }
        
        .button-container {
            text-align: center;
            margin: 20px 0;
        }
        
        button {
            background: #4b6cb7;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(75, 108, 183, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        button i {
            margin-right: 8px;
        }
        
        button:hover {
            background: #395694;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(75, 108, 183, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-weight: 600;
            color: #4b6cb7;
            font-size: 18px;
            margin-top: 5px;
        }
        
        footer {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
        }
        
        .mode-description {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        
        @media (max-width: 600px) {
            .content {
                padding: 15px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .stats {
                flex-direction: column;
                gap: 10px;
            }
            
            .copy-hint {
                position: relative;
                margin-top: 10px;
                justify-content: flex-end;
            }
            
            .mode-btn {
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>正则替换工具</h1>
            <p class="description">支持换行符与空格的相互转换</p>
        </header>
        
        <div class="content">
            <div class="mode-selector">
                <div class="mode-toggle">
                    <button class="mode-btn active" id="modeNewlineToSpace">
                        <i class="fas fa-exchange-alt"></i> 换行符转空格
                    </button>
                    <button class="mode-btn" id="modeSpaceToNewline">
                        <i class="fas fa-exchange-alt"></i> 空格转换行符
                    </button>
                </div>
                <div class="mode-description" id="modeDescription">
                    将文本中的换行符替换为空格
                </div>
            </div>
            
            <div class="input-section">
                <h2><i class="fas fa-pen"></i> 输入内容</h2>
                <textarea id="inputText" placeholder="请输入文本内容..."></textarea>
            </div>
            
            <div class="button-container">
                <button id="replaceBtn">
                    <i class="fas fa-sync-alt"></i> 替换换行符
                </button>
            </div>
            
            <div class="output-section">
                <h2><i class="fas fa-file-export"></i> 输出内容</h2>
                <div class="output-container">
                    <div id="outputText" class="output">替换后的结果将显示在这里...</div>
                    <div class="copy-notification" id="copyNotification">已复制到剪贴板！</div>
                    <div class="copy-hint">
                        <i class="fas fa-mouse-pointer"></i> 点击输出区域可复制文本
                    </div>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div>原文本字符数</div>
                    <div id="originalChars" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div id="targetCountLabel">换行符数量</div>
                    <div id="targetCount" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div>结果字符数</div>
                    <div id="resultChars" class="stat-value">0</div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>正则替换工具 &copy; 2023</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');
            const replaceBtn = document.getElementById('replaceBtn');
            const originalChars = document.getElementById('originalChars');
            const targetCount = document.getElementById('targetCount');
            const targetCountLabel = document.getElementById('targetCountLabel');
            const resultChars = document.getElementById('resultChars');
            const copyNotification = document.getElementById('copyNotification');
            const modeNewlineToSpace = document.getElementById('modeNewlineToSpace');
            const modeSpaceToNewline = document.getElementById('modeSpaceToNewline');
            const modeDescription = document.getElementById('modeDescription');
            
            let currentMode = 'newline-to-space'; // 当前模式
            
            // 模式切换
            modeNewlineToSpace.addEventListener('click', function() {
                setMode('newline-to-space');
            });
            
            modeSpaceToNewline.addEventListener('click', function() {
                setMode('space-to-newline');
            });
            
            function setMode(mode) {
                currentMode = mode;
                
                // 更新按钮状态
                if (mode === 'newline-to-space') {
                    modeNewlineToSpace.classList.add('active');
                    modeSpaceToNewline.classList.remove('active');
                    replaceBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 替换换行符';
                    modeDescription.textContent = '将文本中的换行符替换为空格';
                } else {
                    modeNewlineToSpace.classList.remove('active');
                    modeSpaceToNewline.classList.add('active');
                    replaceBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 替换空格';
                    modeDescription.textContent = '将文本中的空格替换为换行符（最后一个空格不会换行）';
                }
                
                // 更新统计信息标签
                targetCountLabel.textContent = mode === 'newline-to-space' ? '换行符数量' : '空格数量';
                
                // 更新统计信息
                updateStats();
            }
            
            // 更新字符统计
            function updateStats() {
                const text = inputText.value;
                const originalLength = text.length;
                
                let targetCountValue = 0;
                if (currentMode === 'newline-to-space') {
                    // 统计换行符数量
                    targetCountValue = (text.match(/\n/g) || []).length;
                } else {
                    // 统计空格数量
                    targetCountValue = (text.match(/ /g) || []).length;
                }
                
                originalChars.textContent = originalLength;
                targetCount.textContent = targetCountValue;
                
                // 如果已经有输出，更新结果字符数
                if (outputText.textContent !== '替换后的结果将显示在这里...') {
                    resultChars.textContent = outputText.textContent.length;
                }
            }
            
            // 输入时实时更新字符统计
            inputText.addEventListener('input', updateStats);
            
            // 替换按钮点击事件
            replaceBtn.addEventListener('click', function() {
                const text = inputText.value;
                let replacedText = '';
                
                if (currentMode === 'newline-to-space') {
                    // 模式1：将换行符替换为空格
                    replacedText = text.replace(/\n/g, ' ');
                } else {
                    // 模式2：将空格替换为换行符，但最后一个空格不替换
                    // 先替换所有空格为换行符
                    replacedText = text.replace(/ /g, '\n');
                    
                    // 移除末尾的换行符（处理最后一个空格不换行的情况）
                    replacedText = replacedText.replace(/\n+$/, '');
                }
                
                outputText.textContent = replacedText;
                resultChars.textContent = replacedText.length;
                
                // 添加轻微动画效果
                outputText.style.opacity = '0';
                setTimeout(() => {
                    outputText.style.transition = 'opacity 0.3s';
                    outputText.style.opacity = '1';
                }, 50);
            });
            
            // 复制输出文本功能
            outputText.addEventListener('click', function() {
                if (outputText.textContent === '替换后的结果将显示在这里...') {
                    return; // 没有内容时不执行复制
                }
                
                // 创建文本区域保存文本
                const textarea = document.createElement('textarea');
                textarea.value = outputText.textContent;
                document.body.appendChild(textarea);
                
                // 选择并复制文本
                textarea.select();
                document.execCommand('copy');
                
                // 移除临时文本区域
                document.body.removeChild(textarea);
                
                // 显示复制成功通知
                copyNotification.classList.add('show');
                setTimeout(() => {
                    copyNotification.classList.remove('show');
                }, 2000);
                
                // 添加视觉反馈
                outputText.style.backgroundColor = '#e6eeff';
                setTimeout(() => {
                    outputText.style.backgroundColor = '#f8f9fa';
                }, 300);
            });
            
            // 初始化
            setMode('newline-to-space');
        });
    </script>
</body>
</html>
