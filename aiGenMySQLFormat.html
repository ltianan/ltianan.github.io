<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL 格式化 · 逗号紧跟 · WHERE条件分行</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #f5f7fa;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 24px;
        }
        .card {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 44px rgba(0,0,0,0.07);
            padding: 34px 42px;
        }
        h1 {
            font-size: 23px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 small {
            font-size: 14px;
            font-weight: 360;
            color: #64748b;
            margin-left: auto;
        }
        .sub {
            color: #1e293b;
            font-size: 13.5px;
            margin-bottom: 22px;
            border-left: 4px solid #6366f1;
            padding-left: 14px;
            background: #f8fafc;
            border-radius: 0 10px 10px 0;
            line-height: 1.6;
        }
        .flex-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 18px;
        }
        .config-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 4px 14px 4px 16px;
            border-radius: 40px;
            font-size: 13px;
        }
        .config-group label {
            color: #1e293b;
            font-weight: 510;
        }
        .config-group select, .config-group input[type="number"] {
            border: none;
            background: white;
            padding: 4px 10px;
            border-radius: 26px;
            font-size: 13px;
            font-family: inherit;
            outline: 1px solid #cbd5e1;
            min-width: 55px;
        }
        .config-group select:focus, .config-group input:focus {
            outline: 2px solid #6366f1;
        }
        .btn-group {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }
        button {
            background: #6366f1;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 52px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(99,102,241,0.27);
            border: 1px solid transparent;
        }
        button:hover {
            background: #4f46e5;
            transform: scale(1.02);
        }
        button.outline {
            background: transparent;
            color: #1e293b;
            box-shadow: none;
            border: 1px solid #cbd5e1;
        }
        button.outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .textarea-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 6px;
        }
        @media (max-width: 940px) {
            .textarea-pair { grid-template-columns: 1fr; }
            .card { padding: 18px; }
        }
        .box {
            display: flex;
            flex-direction: column;
        }
        .box-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 405;
            color: #1e293b;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .box-header span:last-child {
            color: #94a3b8;
            font-weight: 315;
        }
        textarea {
            width: 100%;
            height: 520px;
            padding: 17px 20px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'SF Mono', monospace;
            font-size: 13px;
            line-height: 1.88;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            resize: vertical;
            background: #fcfcfd;
            color: #0f172a;
            tab-size: 4;
            white-space: pre;
            overflow-x: auto;
        }
        textarea:focus {
            outline: 2px solid #818cf8;
            border-color: transparent;
        }
        .footer-note {
            margin-top: 18px;
            font-size: 12.5px;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-top: 1px solid #e9edf2;
            padding-top: 16px;
        }
        .badge {
            background: #e9edf2;
            padding: 2px 14px;
            border-radius: 999px;
            color: #1e293b;
            font-size: 11.5px;
        }
        .copy-btn {
            background: transparent;
            border: none;
            color: #6366f1;
            font-weight: 480;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .copy-btn:hover {
            background: #eef2ff;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        ✦ SQL 格式化器
        <small>逗号紧跟 · WHERE条件分行 · 括号内永不换行</small>
    </h1>
    <div class="sub">
        字段缩进 <strong>1</strong> 格，表缩进 <strong>2</strong> 格；<br>
        逗号后紧跟内容无空格；WHERE 每个条件单独一行（AND/OR 开头）；括号内永不换行。
    </div>

    <div class="flex-row">
        <div class="config-group">
            <label>关键字</label>
            <select id="keywordCase">
                <option value="upper">大写</option>
                <option value="lower">小写</option>
            </select>
        </div>
        <div class="config-group">
            <label>缩进字符</label>
            <select id="indentStyle">
                <option value="space">空格</option>
                <option value="tab">Tab</option>
            </select>
            <input type="number" id="indentSize" value="2" min="2" max="8" step="2" style="width:54px;">
        </div>
        <div class="btn-group">
            <button id="formatBtn">⚡ 格式化</button>
            <button id="clearBtn" class="outline">清空</button>
        </div>
    </div>

    <div class="textarea-pair">
        <div class="box">
            <div class="box-header">
                <span>📄 原始 SQL</span>
                <span>粘贴后点击格式化</span>
            </div>
            <textarea id="inputSql" placeholder="-- 在此粘贴 SQL ...&#10;SELECT a,b,c FROM t WHERE id=1;">select (select regionname from gdyy.sa_db_region x where x.regionid=a.region)
,'无线商话',c.groupid,d.custname,a.servnumber,( select dictname from gdyy.sa_db_dictitem x where x.groupid='US' and x.dictid=a.status)
,a.createdate,a.statusdate,b.memservnumber,(select dictname from gdyy.sa_db_dictitem x where x.groupid='MemberStatus' and x.dictid=b.status ),
b.startdate from mgsj_gdyy.cm_subs_subscriber a
,gdyy.cm_group_member b -- jcfw.TS_E_SJDCRM_CORP_MBR_D 日全量表
,
(select groupid,custid from gdyy.cm_cu_group union  select groupid,custid from mgsj_gdyy.cm_cu_group_his) c, gdyy.cm_cu_customer  d
where a.prodid='2046' and a.subsid=b.groupoid and c.custid=a.custid and d.custid=c.custid  ;</textarea>
        </div>
        <div class="box">
            <div class="box-header">
                <span>✨ 格式化结果</span>
                <span>逗号紧跟 · WHERE条件分行 · 括号内单行</span>
            </div>
            <textarea id="outputSql" readonly placeholder="格式化后的 SQL 将显示在这里……"></textarea>
        </div>
    </div>

    <div class="footer-note">
        <div>
            <span class="badge">⏎ 逗号紧跟</span>
            <span class="badge" style="margin-left:6px;">⊞ WHERE条件分行</span>
            <span class="badge" style="margin-left:6px;">⊞ 括号内永不换行</span>
            <span class="badge" style="margin-left:6px;">🗒 备注→/* */</span>
            <span class="badge" style="margin-left:6px;">↔ 字段1表2</span>
        </div>
        <button class="copy-btn" id="copyOutputBtn">📋 复制结果</button>
    </div>
</div>

<script>
    (function() {
        function formatSql(sql, keywordCase, indentChar, indentSize) {
            if (!sql || !sql.trim()) return '';
            
            const baseUnit = indentChar === 'tab' ? '\t' : ' '.repeat(indentSize || 4);
            const fieldIndent = baseUnit.repeat(1);
            const tableIndent = baseUnit.repeat(2);

            let raw = sql.replace(/\r\n?/g, '\n').replace(/[ \t]+\n/g, '\n');

            // ---- 第0步：保护字符串 ----
            const strings = [];
            let sidx = 0;
            raw = raw.replace(/'[^']*'/g, (match) => {
                const key = `__STR${sidx}__`;
                strings.push(match);
                sidx++;
                return key;
            });

            // ---- 第0步：保护注释（行注释转块注释）----
            const comments = [];
            let cidx = 0;
            raw = raw.replace(/\/\*[\s\S]*?\*\//g, (match) => {
                const key = `__CMT${cidx}__`;
                comments.push(match);
                cidx++;
                return key;
            });
            raw = raw.replace(/--(.+?)(?:\n|$)/g, (match, content) => {
                let trimmedContent = content.replace(/\n$/, '').trim();
                if (trimmedContent) {
                    const key = `__CMT${cidx}__`;
                    comments.push(`/* ${trimmedContent} */`);
                    cidx++;
                    return key + '\n';
                } else {
                    return '\n';
                }
            });

            // ---- 第1步：【最高优先级】提取所有括号内容 ----
            const bracketContents = [];
            let bidx = 0;
            let textWithoutBrackets = '';
            let depth = 0;
            let currentBracket = '';

            for (let i = 0; i < raw.length; i++) {
                const ch = raw[i];
                if (ch === '(') {
                    if (depth === 0) {
                        currentBracket = '(';
                        depth = 1;
                    } else {
                        currentBracket += '(';
                        depth++;
                    }
                } else if (ch === ')') {
                    depth--;
                    if (depth === 0) {
                        currentBracket += ')';
                        const key = `__BRACKET${bidx}__`;
                        bracketContents.push(currentBracket);
                        textWithoutBrackets += key;
                        bidx++;
                        currentBracket = '';
                    } else {
                        currentBracket += ')';
                    }
                } else {
                    if (depth > 0) {
                        currentBracket += ch;
                    } else {
                        textWithoutBrackets += ch;
                    }
                }
            }
            if (currentBracket) {
                textWithoutBrackets += currentBracket;
            }

            // ---- 在 textWithoutBrackets 上做所有换行操作 ----
            let working = textWithoutBrackets;

            // 1. FROM/WHERE/ORDER BY/GROUP BY/HAVING/UNION 前换行
            working = working.replace(/\bfrom\b/gi, '\nFROM');
            working = working.replace(/\bwhere\b/gi, '\nWHERE');
            working = working.replace(/\border by\b/gi, '\nORDER BY');
            working = working.replace(/\bgroup by\b/gi, '\nGROUP BY');
            working = working.replace(/\bhaving\b/gi, '\nHAVING');
            working = working.replace(/\bunion\b/gi, '\nUNION');

            // 2. WHERE 条件中的 AND/OR 前换行（使每个条件单独一行）
            // 注意：只在 WHERE 之后的部分处理 AND/OR
            // 简单方法：将 AND/OR 前换行（但避免影响括号内的）
            working = working.replace(/\band\b/gi, '\nAND');
            working = working.replace(/\bor\b/gi, '\nOR');

            // 3. 逗号换行 + 逗号前置（逗号后紧跟内容，不留空格）
            working = working.replace(/,/g, '\n,');

            // ---- 现在将 bracketContents 压缩为单行 ----
            for (let i = 0; i < bracketContents.length; i++) {
                let content = bracketContents[i];
                let inner = content.slice(1, -1).trim();
                let compressed = inner.replace(/\s+/g, ' ');
                const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'UNION', 'ALL', 'ON', 'INNER', 'LEFT', 'RIGHT', 'OUTER', 'JOIN', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT', 'OFFSET', 'AS', 'NOT', 'NULL', 'IS', 'IN', 'EXISTS', 'BETWEEN', 'LIKE', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'DISTINCT', 'TOP', 'WITH', 'RECURSIVE'];
                if (keywordCase === 'upper') {
                    const re = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'gi');
                    compressed = compressed.replace(re, (m) => m.toUpperCase());
                } else {
                    const re = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'gi');
                    compressed = compressed.replace(re, (m) => m.toLowerCase());
                }
                bracketContents[i] = '(' + compressed + ')';
                working = working.replace(`__BRACKET${i}__`, bracketContents[i]);
            }

            // ---- 恢复注释和字符串 ----
            for (let i = 0; i < comments.length; i++) {
                working = working.replace(`__CMT${i}__`, comments[i]);
            }
            for (let i = 0; i < strings.length; i++) {
                working = working.replace(`__STR${i}__`, strings[i]);
            }

            // ---- 全局关键字大小写 ----
            const globalKeywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'UNION', 'ALL', 'ON', 'INNER', 'LEFT', 'RIGHT', 'OUTER', 'JOIN', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT', 'OFFSET', 'AS', 'NOT', 'NULL', 'IS', 'IN', 'EXISTS', 'BETWEEN', 'LIKE', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'DISTINCT', 'TOP', 'WITH', 'RECURSIVE'];
            if (keywordCase === 'upper') {
                const re = new RegExp('\\b(' + globalKeywords.join('|') + ')\\b', 'gi');
                working = working.replace(re, (m) => m.toUpperCase());
            } else {
                const re = new RegExp('\\b(' + globalKeywords.join('|') + ')\\b', 'gi');
                working = working.replace(re, (m) => m.toLowerCase());
            }

            // ---- 清理：去除逗号前的空格，确保逗号紧跟内容 ----
            // 将 ", " 替换为 ","（逗号后可能有空格）
            working = working.replace(/,\s+/g, ',');

            // ---- 缩进处理 ----
            const lines = working.split('\n');
            let outputLines = [];
            let inFromOrJoin = false;
            let inWhereClause = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                let trimmed = line.trim();
                if (trimmed === '') continue;

                let upperTrimmed = trimmed.toUpperCase();

                if (upperTrimmed.startsWith('FROM') || upperTrimmed.startsWith('JOIN') || upperTrimmed.startsWith('INNER JOIN') || upperTrimmed.startsWith('LEFT JOIN') || upperTrimmed.startsWith('RIGHT JOIN') || upperTrimmed.startsWith('OUTER JOIN')) {
                    inFromOrJoin = true;
                    inWhereClause = false;
                } else if (upperTrimmed.startsWith('WHERE')) {
                    inFromOrJoin = false;
                    inWhereClause = true;
                } else if (upperTrimmed.startsWith('UNION') || upperTrimmed.startsWith('ORDER BY') || upperTrimmed.startsWith('GROUP BY') || upperTrimmed.startsWith('HAVING') || upperTrimmed.startsWith('LIMIT')) {
                    inFromOrJoin = false;
                    inWhereClause = false;
                }

                let indentLevel = 0;

                if (upperTrimmed.startsWith('SELECT')) {
                    indentLevel = 0;
                } else if (upperTrimmed.startsWith('FROM') || upperTrimmed.startsWith('JOIN') || upperTrimmed.startsWith('INNER JOIN') || upperTrimmed.startsWith('LEFT JOIN') || upperTrimmed.startsWith('RIGHT JOIN') || upperTrimmed.startsWith('OUTER JOIN')) {
                    indentLevel = 0;
                } else if (upperTrimmed.startsWith('WHERE') || upperTrimmed.startsWith('UNION') || upperTrimmed.startsWith('ORDER BY') || upperTrimmed.startsWith('GROUP BY') || upperTrimmed.startsWith('HAVING') || upperTrimmed.startsWith('LIMIT')) {
                    indentLevel = 0;
                } else if (inWhereClause) {
                    // WHERE 条件中的 AND/OR 行，缩进1格（与字段同级）
                    indentLevel = 1;
                } else if (inFromOrJoin) {
                    indentLevel = 2;
                } else {
                    indentLevel = 1;
                }

                let effectiveIndent = '';
                if (indentLevel === 1) {
                    effectiveIndent = fieldIndent;
                } else if (indentLevel === 2) {
                    effectiveIndent = tableIndent;
                } else {
                    effectiveIndent = '';
                }

                outputLines.push(effectiveIndent + trimmed);
            }

            let final = outputLines.map(l => l.replace(/\s+$/, '')).join('\n');
            final = final.replace(/\s*;\s*$/, ';');
            return final;
        }

        const inputEl = document.getElementById('inputSql');
        const outputEl = document.getElementById('outputSql');
        const formatBtn = document.getElementById('formatBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyOutputBtn');

        function doFormat() {
            const sql = inputEl.value;
            const keywordCase = document.getElementById('keywordCase').value;
            const indentStyle = document.getElementById('indentStyle').value;
            const indentSize = parseInt(document.getElementById('indentSize').value, 10) || 4;
            try {
                const formatted = formatSql(sql, keywordCase, indentStyle, indentSize);
                outputEl.value = formatted;
            } catch (e) {
                outputEl.value = '⚠️ 格式化出错: ' + e.message;
            }
        }

        formatBtn.addEventListener('click', doFormat);

        clearBtn.addEventListener('click', () => {
            inputEl.value = '';
            outputEl.value = '';
        });

        copyBtn.addEventListener('click', async () => {
            const text = outputEl.value;
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.textContent = '✅ 已复制';
                setTimeout(() => { copyBtn.textContent = '📋 复制结果'; }, 3800);
            } catch {
                alert('复制失败，请手动选中复制');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(doFormat, 250);
        });

        inputEl.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                doFormat();
            }
        });
    })();
</script>
</body>
</html>
